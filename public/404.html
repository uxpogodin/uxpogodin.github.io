<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting…</title>
    <script>
      // GitHub Pages SPA redirect — saves the full path to sessionStorage,
      // then sends the browser back to the root so index.html can pick it up.
      sessionStorage.setItem(
        '__spa_redirect',
        window.location.pathname + window.location.search + window.location.hash
      );
      window.location.replace('/');
    </script>
  </head>
  <body></body>
</html>
