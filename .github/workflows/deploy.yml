name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Apply GitHub Pages patches
        run: |
          node -e 'const fs=require("fs"),c=fs.readFileSync("src/app/routes.ts","utf8");if(!c.includes("basename")){const p=c.replace(/(createBrowserRouter\(\[[\s\S]*?\])\s*\)/,"$1, { basename: import.meta.env.BASE_URL })");fs.writeFileSync("src/app/routes.ts",p);}console.log("routes.ts ok");'
          cat > vite.config.ts << 'VITE_EOF'
          import { defineConfig } from 'vite'
          import path from 'path'
          import fs from 'fs'
          import tailwindcss from '@tailwindcss/vite'
          import react from '@vitejs/plugin-react'
          function buildPublicAssetMap(): Record<string, string> {
            const map: Record<string, string> = {};
            try {
              const files = fs.readdirSync(path.resolve(__dirname, 'public'));
              for (const file of files) {
                const ext = path.extname(file);
                const hash = path.basename(file, ext);
                if (hash.match(/^[a-f0-9]{40}$/)) map[hash] = file;
              }
            } catch {}
            return map;
          }
          const publicAssetMap = buildPublicAssetMap();
          let figmaAssetBase = '/';
          const figmaAssetPlugin = {
            name: 'figma-asset-resolver',
            configResolved(config: any) { figmaAssetBase = config.base; },
            resolveId(id: string) {
              if (id.startsWith('figma:asset/')) return '\0' + id;
            },
            load(id: string) {
              if (id.startsWith('\0figma:asset/')) {
                const filename = id.replace('\0figma:asset/', '');
                const hash = path.basename(filename, path.extname(filename));
                const actualFile = publicAssetMap[hash] ?? filename;
                return `export default ${JSON.stringify(figmaAssetBase + actualFile)};`;
              }
            },
          };
          const spaFallback = {
            name: 'spa-github-pages',
            transformIndexHtml(html: string) {
              const script = `<script>(function(){var r=sessionStorage.getItem('__spa_redirect');if(r){sessionStorage.removeItem('__spa_redirect');window.history.replaceState(null,'',r);}})();</script>`;
              return html.replace('<head>', '<head>' + script);
            },
          };
          export default defineConfig({
            plugins: [react(), tailwindcss(), figmaAssetPlugin, spaFallback],
            resolve: { alias: { '@': path.resolve(__dirname, './src') } },
            base: '/',
            assetsInclude: ['**/*.svg', '**/*.csv'],
          })
          VITE_EOF
      - run: npm install
      - run: npm run build
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
